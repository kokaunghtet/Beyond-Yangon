<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Yangon | Myanmar Regional Explorer</title>

  <!-- map data link -->
  <script src="./js/mapdata.js"></script>
  <script src="./js/countrymap.js"></script>

  <!-- custom css link -->
  <link rel="stylesheet" href="./css/base.css">
</head>

<body>
  <header class="header" id="main-header">
    <div class="logo">BEYOND YANGON</div>
    <div class="nav-links">
      <a href="#">HOME</a>
      <a href="#">ABOUT US</a>
      <a href="#">CONTACT</a>
    </div>
  </header>

  <div class="dashboard-container" id="dashboard">
    <!-- Map Side -->
    <div id="left-side">
      <!-- Map -->
      <div id="map"></div>

      <!-- Back Btn -->
      <button class="map-back-btn" onclick="goBack()">
        &leftarrow; BACK TO ALL REGIONS
      </button>
    </div>

    <!-- Text Side -->
    <div id="right-side">
      <!-- Navbar -->
      <div class="cat-navbar">
        <button class="cat-nav-btn active" onclick="showTab('loc', this)">
          Location
        </button>
        <button class="cat-nav-btn" onclick="showTab('cap', this)">
          Capital
        </button>
        <button class="cat-nav-btn" onclick="showTab('eth', this)">
          Ethnic
        </button>
        <button class="cat-nav-btn" onclick="showTab('wea', this)">
          Weather
        </button>
        <button class="cat-nav-btn" onclick="showTab('cul', this)">
          Culture
        </button>
        <button class="cat-nav-btn" onclick="showTab('foo', this)">
          Food
        </button>
        <button class="cat-nav-btn" onclick="showTab('eco', this)">
          Economy
        </button>
        <button class="cat-nav-btn" onclick="showTab('tou', this)">
          Tourism
        </button>
      </div>

      <!-- Content -->
      <div class="content-area">
        <h1 id="r-name">Region</h1>
        <div id="p-loc" class="pane active">
          <p id="d-loc"></p>
        </div>
        <div id="p-cap" class="pane">
          <h3>Capital</h3>
          <p id="d-cap"></p>
        </div>
        <div id="p-eth" class="pane">
          <h3>Ethnic Groups</h3>
          <p id="d-eth"></p>
        </div>
        <div id="p-wea" class="pane">
          <h3>Climate</h3>
          <p id="d-wea"></p>
        </div>
        <div id="p-cul" class="pane">
          <h3>Culture & Traditions</h3>
          <p id="d-cul"></p>
        </div>
        <div id="p-foo" class="pane">
          <h3>Local Food</h3>
          <p id="d-foo"></p>
        </div>
        <div id="p-eco" class="pane">
          <h3>Economy</h3>
          <p id="d-eco"></p>
        </div>
        <div id="p-tou" class="pane">
          <h3>Famous Places</h3>
          <p id="d-tou"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- custom js link -->
  <script src="./js/app.js"></script>
</body>

</html>
