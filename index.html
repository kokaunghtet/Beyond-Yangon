<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Yangon | Myanmar Regional Explorer</title>

  <script src="mapdata.js"></script>
  <script src="countrymap.js"></script>
  <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>
  <header class="header" id="main-header">
    <div class="logo">BEYOND YANGON</div>
    <div class="nav-links">
      <span>HOME</span><span>ABOUT</span><span>CONTACT</span>
    </div>
  </header>

  <div class="dashboard-container" id="dashboard">
    <div id="left-side">
      <div id="map"></div>
      <button class="map-back-btn" onclick="goBack()">
        ← BACK TO ALL REGIONS
      </button>
    </div>

    <div id="right-side">
      <div class="cat-navbar">
        <button class="cat-nav-btn active" onclick="showTab('loc', this)">
          Location
        </button>
        <button class="cat-nav-btn" onclick="showTab('cap', this)">
          Capital
        </button>
        <button class="cat-nav-btn" onclick="showTab('eth', this)">
          Ethnic
        </button>
        <button class="cat-nav-btn" onclick="showTab('wea', this)">
          Weather
        </button>
        <button class="cat-nav-btn" onclick="showTab('cul', this)">
          Culture
        </button>
        <button class="cat-nav-btn" onclick="showTab('foo', this)">
          Food
        </button>
        <button class="cat-nav-btn" onclick="showTab('eco', this)">
          Economy
        </button>
        <button class="cat-nav-btn" onclick="showTab('tou', this)">
          Tourism
        </button>
      </div>

      <div class="content-area">
        <h1 id="r-name">Region</h1>
        <div id="p-loc" class="pane active">
          <p id="d-loc"></p>
        </div>
        <div id="p-cap" class="pane">
          <h3>Capital</h3>
          <p id="d-cap"></p>
        </div>
        <div id="p-eth" class="pane">
          <h3>Ethnic Groups</h3>
          <p id="d-eth"></p>
        </div>
        <div id="p-wea" class="pane">
          <h3>Climate</h3>
          <p id="d-wea"></p>
        </div>
        <div id="p-cul" class="pane">
          <h3>Culture & Traditions</h3>
          <p id="d-cul"></p>
        </div>
        <div id="p-foo" class="pane">
          <h3>Local Food</h3>
          <p id="d-foo"></p>
        </div>
        <div id="p-eco" class="pane">
          <h3>Economy</h3>
          <p id="d-eco"></p>
        </div>
        <div id="p-tou" class="pane">
          <h3>Famous Places</h3>
          <p id="d-tou"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const regionData = {
      MM01: {
        name: "Sagaing State",
        loc: "Located in ..."
      },
      MM17: {
        name: "Shan State",
        loc: "Located in Eastern Myanmar...",
        cap: "Taunggyi",
        eth: "Shan, Pa-O, Intha...",
        wea: "Cool and temperate",
        cul: "Leg rowing tradition",
        foo: "Shan Noodles",
        eco: "Agriculture/Mining",
        tou: "Inle Lake",
      },
      MM06: {
        name: "Yangon Region",
        loc: "The main economic hub...",
        cap: "Yangon",
        eth: "Bamar, Karen, Mon...",
        wea: "Tropical Monsoon",
        cul: "Colonial & Buddhist heritage",
        foo: "Mohinga",
        eco: "Trading/Industry",
        tou: "Shwedagon Pagoda",
      },
      MM04: {
        name: "Mandalay Region",
        loc: "Cultural heart of Myanmar...",
        cap: "Mandalay",
        eth: "Bamar",
        wea: "Dry and hot",
        cul: "Royal traditions",
        foo: "Mandalay Myee Shay",
        eco: "Tourism/Agriculture",
        tou: "Bagan",
      },
      // တခြား ID တွေ ဒီအတိုင်း ထပ်ထည့်ရုံပါပဲ...
    };

    simplemaps_countrymap.hooks.click_state = function (id) {
      const data = regionData[id] || { name: id, loc: "Data coming soon..." };

      // Hide header & slide layout
      document.getElementById("main-header").classList.add("hidden");
      document.getElementById("dashboard").classList.add("active-layout");

      // Highlight selected state only
      const allPaths = document.querySelectorAll("#map svg path");
      allPaths.forEach((p) => p.classList.remove("selected-state"));
      const selectedPath = document.querySelector(".sm_state_" + id);
      if (selectedPath) selectedPath.classList.add("selected-state");

      // Set Data
      document.getElementById("r-name").innerText = data.name;
      document.getElementById("d-loc").innerText = data.loc || "";
      document.getElementById("d-cap").innerText = data.cap || "";
      document.getElementById("d-eth").innerText = data.eth || "";
      document.getElementById("d-wea").innerText = data.wea || "";
      document.getElementById("d-cul").innerText = data.cul || "";
      document.getElementById("d-foo").innerText = data.foo || "";
      document.getElementById("d-eco").innerText = data.eco || "";
      document.getElementById("d-tou").innerText = data.tou || "";

      showTab("loc", document.querySelector(".cat-nav-btn"));
    };

    function goBack() {
      document.getElementById("main-header").classList.remove("hidden");
      document.getElementById("dashboard").classList.remove("active-layout");
      document
        .querySelectorAll("#map svg path")
        .forEach((p) => p.classList.remove("selected-state"));
    }

    function showTab(tabId, btn) {
      document
        .querySelectorAll(".cat-nav-btn")
        .forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      document
        .querySelectorAll(".pane")
        .forEach((p) => p.classList.remove("active"));
      document.getElementById("p-" + tabId).classList.add("active");
    }
  </script>
</body>

</html>
