<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<title>Beyond Yangon | Myanmar Regional Explorer</title>

<!-- map data link -->
<script src="./js/mapdata.js"></script>
<script src="./js/countrymap.js"></script>

<link rel="icon" href="./photo/Logo.jpg">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<!-- custom css link -->
<link rel="stylesheet" href="./css/base.css" />
</head>

<body>

  <header class="header" id="main-header">
    <div class="logo">BEYOND YANGON</div>
  </header>

  <div class="dashboard-container" id="dashboard">
    <!-- Map Side -->
    <div id="left-side">
      <!-- Map -->
      <div id="map"></div>
    </div>

    <!-- Text Side -->
    <div id="right-side">
      <div class="content-area">
        <h1 id="r-name">Region</h1>

        <!-- OVERVIEW -->
        <div id="p-overview" class="pane active">
          <div class="card-flex" id="overview-card"></div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <button id="go-to-page2-btn" onclick="revealCityExplorer()">
    Explore Cities
  </button>

  <button id="back-to-state-btn" class="back-to-state-btn" onclick="returnToStateView()">
    Back to State
  </button>

  <section id="city-explorer-section" class="city-explorer-page">
    <div class="city-info-left">
      <h1 id="exp-city-name">CITY NAME</h1>
      <p id="exp-city-desc">Description text...</p>
    </div>
    <div class="city-nav-right" id="city-nav-right"></div>
  </section>

  <div id="nagano-ui-overlay" class="nagano-full-page">
    <div class="nagano-header">
      <button class="nagano-back-btn" onclick="closeNaganoExplorer()">
        Back to Dashboard
      </button>
      <nav class="nagano-top-nav" id="nagano-category-menu"></nav>
    </div>

    <div class="nagano-main-content">
      <div class="nagano-info-text">
        <span class="exploring-tag">EXPLORING STATE</span>
        <h1 id="nagano-title">SHAN NOODLES</h1>
        <p id="nagano-desc">Light, savory bowls with traditional Shan flavors.</p>

        <div class="premium-btn-group">
          <div class="bookmark-icon">
            <i class="fas fa-bookmark"></i>
          </div>
          <button class="discover-btn">DISCOVER LOCATION</button>
        </div>
      </div>

      <div class="nagano-cards-wrapper">
        <div id="nagano-cards-holder"></div>
      </div>
    </div>
  </div>


  <!-- custom js link -->
  <script src="./js/app.js"></script>
</body>

</html>
